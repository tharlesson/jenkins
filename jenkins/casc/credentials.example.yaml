# Copie este arquivo para credentials.yaml e adicione ao CASC_JENKINS_CONFIG, se necessario.
# Nao comite segredos reais no git.
credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              id: "nexus-ci"
              description: "Credenciais para publicacao de artefatos no Nexus"
              scope: GLOBAL
              username: "${NEXUS_CI_USER:-nexus-ci}"
              password: "${NEXUS_CI_PASSWORD:-change_me}"
          - usernamePassword:
              id: "aws-deploy"
              description: "Credenciais AWS para CD em ECS (usuario=chave de acesso, senha=chave secreta)"
              scope: GLOBAL
              username: "${AWS_ACCESS_KEY_ID:-change_me}"
              password: "${AWS_SECRET_ACCESS_KEY:-change_me}"
          - usernamePassword:
              id: "registry-ci"
              description: "Credenciais de registry de container"
              scope: GLOBAL
              username: "${REGISTRY_USER:-change_me}"
              password: "${REGISTRY_PASSWORD:-change_me}"
          - string:
              id: "sonar-token"
              description: "Token para scanner SonarQube"
              scope: GLOBAL
              secret: "${SONAR_TOKEN:-change_me}"
          - basicSSHUserPrivateKey:
              id: "ssh-deploy"
              description: "Chave SSH para deploy em VM/Docker"
              scope: GLOBAL
              username: "${SSH_DEPLOY_USER:-jenkins}"
              privateKeySource:
                directEntry:
                  privateKey: "${SSH_DEPLOY_PRIVATE_KEY:-change_me}"
          - file:
              id: "kubeconfig"
              description: "Arquivo kubeconfig para CD em Kubernetes"
              scope: GLOBAL
              fileName: "config"
              secretBytes: "${KUBECONFIG_B64:-change_me_base64}"

